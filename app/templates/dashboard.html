<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="csrf-token" content="{{ csrf_token() }}" />
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <title>HAWK RADAR — Analytics</title>
  <style>
    :root {
      --bg: #0a0f1a; --panel: #121a2a; --line: #243149;
      --text: #e6eefc; --muted: #9aa8c3; --accent: #4cc9f0;
      --ok: #80ed99; --warn: #ffb703; --danger: #ff4d6d;
    }
    body.light {
      background: radial-gradient(circle at top right, #d6e8f8 0%, #eef4fd 45%);
      --bg: #eef4fd; --panel: #fff; --line: #c5d4e8;
      --text: #0f172a; --muted: #334155; --accent: #005f8f;
      --ok: #166534; --warn: #92400e; --danger: #b42318;
    }
    body.light .app { background: #fff; border-color: #c5d4e8; }
    body.light .stat-card { background: #edf3fc; }
    body.light .chart-panel { background: #edf3fc; }
    body.light .table-panel { background: #edf3fc; }
    body.light .feed-panel { background: #edf3fc; }
    body.light .bar { background: transparent; }
    body.light .donut-inner { background: #edf3fc; }
    body.light .nav-brand h1 { color: #005f8f; }
    body.light .stat-label,
    body.light .chart-title,
    body.light th,
    body.light td,
    body.light .feed-list li,
    body.light .subtitle { color: var(--text); }

    * { box-sizing: border-box; margin: 0; }
    html { scroll-behavior: smooth; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 99px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

    body {
      margin: 0; font-family: 'Roboto', 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
      background: radial-gradient(circle at top right, #18263d 0%, var(--bg) 45%);
      color: var(--text); min-height: 100vh;
      display: grid; place-items: center; padding: 16px;
    }
    .app {
      width: 100%; max-width: 1200px; background: var(--panel);
      border: 1px solid var(--line); border-radius: 16px; padding: 32px 40px 40px;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      animation: fadeIn .45s ease-out;
      box-shadow: 0 16px 64px rgba(0,0,0,.2);
    }

    .top-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid var(--line);
    }
    .nav-brand h1 { margin: 0; font-size: 1.8rem; letter-spacing: 0.08em; color: var(--accent); }
    .nav-brand .subtitle { margin: 4px 0 0; color: var(--muted); font-size: 0.9rem; }
    .nav-links { display: flex; align-items: center; gap: 12px; }
    .nav-btn {
      text-decoration: none; color: var(--text); border: 1px solid var(--line);
      border-radius: 10px; padding: 8px 18px; font-size: 0.9rem; font-weight: 600;
      transition: border-color 0.15s, color 0.15s; cursor: pointer; background: none;
    }
    .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
    .nav-btn.logout { color: #ff9b9b; border-color: #3a1a1a; }
    .nav-btn.logout:hover { border-color: #ff9b9b; }
    .hamburger {
      display: none; background: none; border: 1px solid var(--line); border-radius: 8px;
      color: var(--text); font-size: 1.4rem; padding: 6px 10px; cursor: pointer;
    }
    .hamburger:hover { border-color: var(--accent); }

    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
    .stat-card {
      background: #0d1422; border: 1px solid var(--line); border-radius: 12px;
      padding: 20px; text-align: center;
      transition: border-color .2s, transform .2s, box-shadow .2s;
    }
    .stat-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(76,201,240,.08);
    }
    .stat-value { font-size: 2.2rem; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-top: 4px; }

    .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
    .chart-panel {
      background: #0d1422; border: 1px solid var(--line); border-radius: 12px; padding: 20px;
      transition: border-color .2s;
    }
    .chart-panel:hover { border-color: rgba(76,201,240,.25); }
    .chart-title {
      font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--muted); margin: 0 0 16px;
    }

    .bar-chart { display: flex; align-items: flex-end; gap: 3px; height: 180px; padding-top: 10px; }
    .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; }
    .bar {
      width: 100%; min-width: 6px; max-width: 28px; background: transparent;
      border-radius: 4px 4px 0 0; transition: height 0.4s ease; position: relative;
      overflow: hidden;
    }
    .bar:hover { opacity: 0.85; }
    .bar-label {
      font-size: 0.58rem; color: var(--muted); margin-top: 4px;
      white-space: nowrap; transform: rotate(-45deg); transform-origin: top left;
    }
    .bar-val {
      position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
      font-size: 0.65rem; color: var(--accent); white-space: nowrap;
    }

    .donut-wrap { display: flex; align-items: center; justify-content: center; gap: 28px; }
    .donut {
      width: 160px; height: 160px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .donut-inner {
      width: 90px; height: 90px; border-radius: 50%; background: #0d1422;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; font-weight: 700; color: var(--text);
    }
    .donut-legend { font-size: 0.82rem; }
    .donut-legend div { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .legend-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }

    .table-panel {
      background: #0d1422; border: 1px solid var(--line);
      border-radius: 12px; padding: 20px; margin-bottom: 28px;
    }
    .tables-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--line); }
    th { color: var(--muted); font-size: 0.74rem; text-transform: uppercase; letter-spacing: 0.08em; }

    .feed-panel {
      background: #0d1422; border: 1px solid var(--line); border-radius: 12px; padding: 20px;
    }
    .feed-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 0.88rem; }
    .feed-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    .feed-dot.ok { background: var(--ok); }
    .feed-dot.warn { background: var(--warn); }
    .feed-dot.err { background: var(--danger); }
    .feed-dot.off { background: var(--muted); }

    .loading-msg { text-align: center; color: var(--muted); padding: 40px 0; font-size: 0.9rem; }

    @media (max-width: 860px) {
      .hamburger { display: block; }
      .nav-links {
        display: none; position: absolute; top: 100%; right: 0;
        flex-direction: column; align-items: stretch;
        background: var(--panel); border: 1px solid var(--line);
        border-radius: 12px; padding: 12px; gap: 8px;
        min-width: 200px; z-index: 100;
        box-shadow: 0 12px 36px rgba(0,0,0,.35);
      }
      .nav-links.open { display: flex; animation: fadeIn .2s ease-out; }
      .top-nav { position: relative; }
      .nav-btn { text-align: center; }
      .charts { grid-template-columns: 1fr; }
      .tables-row { grid-template-columns: 1fr; }
    }
    @media (max-width: 560px) {
      body { padding: 8px; }
      .app { border-radius: 12px; padding: 20px 16px 28px; }
      .nav-brand h1 { font-size: 1.3rem; }
      .stats { grid-template-columns: 1fr 1fr; gap: 10px; }
      .stat-value { font-size: 1.6rem; }
      .donut-wrap { flex-direction: column; gap: 16px; }
      .donut { width: 130px; height: 130px; }
      .donut-inner { width: 72px; height: 72px; font-size: 1.1rem; }
      .bar-chart { overflow-x: auto; min-width: 0; }
      table { font-size: 0.8rem; }
      th, td { padding: 8px 8px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <nav class="top-nav">
      <div class="nav-brand">
        <h1>📊 Analytics</h1>
        <p class="subtitle">Threat feed analytics &amp; feed health</p>
      </div>
      <div class="nav-links">
        <button id="themeBtn" class="nav-btn" style="padding:8px 14px;font-size:1.1rem;line-height:1;">🌙</button>
        <a href="/" class="nav-btn">🦅 Radar</a>
        {% if session.get('site_role') == 'admin' %}
        <a href="/admin" class="nav-btn">👥 Admin</a>
        {% endif %}
        <a href="/settings" class="nav-btn">⚙ Settings</a>
        <a href="/logout" class="nav-btn logout">Logout</a>
      </div>
      <button class="hamburger" id="menuToggle" aria-label="Menu">☰</button>
    </nav>
    <div id="content"><div class="loading-msg">🦅 Loading analytics…</div></div>
  </main>

  <script>
    const CSRF = document.querySelector('meta[name="csrf-token"]').getAttribute('content');

    function esc(v) {
      if (v === null || v === undefined) return "-";
      return String(v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    async function loadDashboard() {
      const [analyticsResp, feedResp] = await Promise.all([
        fetch('/web/analytics', { headers: { 'X-CSRFToken': CSRF } }),
        fetch('/web/feed-status', { headers: { 'X-CSRFToken': CSRF } }),
      ]);
      const analytics = await analyticsResp.json();
      const feedData = await feedResp.json();
      const el = document.getElementById('content');

      const sev = analytics.severity_counts || {};

      // Stats
      let html = `
        <div class="stats">
          <div class="stat-card"><div class="stat-value">${esc(analytics.total)}</div><div class="stat-label">Total Items</div></div>
          <div class="stat-card"><div class="stat-value">${esc(analytics.last_24h)}</div><div class="stat-label">Last 24 Hours</div></div>
          <div class="stat-card"><div class="stat-value" style="color:var(--danger)">${esc(analytics.critical_count)}</div><div class="stat-label">Critical</div></div>
          <div class="stat-card"><div class="stat-value">${(analytics.feed_stats || []).length}</div><div class="stat-label">Active Feeds</div></div>
        </div>
      `;

      // Charts row
      html += '<div class="charts">';

      // Bar chart — stacked severity per day (U4)
      const sevColors = {critical:'#ff4d6d', high:'#ffb703', medium:'#4cc9f0', low:'#80ed99', unknown:'#9aa8c3'};
      html += '<div class="chart-panel"><div class="chart-title">Severity Timeline (Last 30 Days)</div>';
      if (analytics.by_day && analytics.by_day.length) {
        const maxC = Math.max(...analytics.by_day.map(d => (d.total || d.count || 0)), 1);
        html += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;font-size:0.72rem;">';
        for (const [s, c] of Object.entries(sevColors)) {
          html += `<span style="display:inline-flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:${c};display:inline-block;"></span>${s}</span>`;
        }
        html += '</div>';
        html += '<div class="bar-chart">';
        for (const d of analytics.by_day) {
          const dayTotal = d.total || d.count || 0;
          const pct = Math.max((dayTotal / maxC) * 100, 2);
          // Build stacked segments
          let segments = '';
          if (dayTotal > 0) {
            for (const s of ['unknown','low','medium','high','critical']) {
              const val = d[s] || 0;
              if (val > 0) {
                const segPct = (val / dayTotal) * 100;
                segments += `<div style="width:100%;height:${segPct}%;background:${sevColors[s]};min-height:1px;" title="${s}: ${val}"></div>`;
              }
            }
          }
          html += `<div class="bar-col">
            <div class="bar" style="height:${pct}%;display:flex;flex-direction:column-reverse;background:transparent;overflow:hidden;border:none;">
              ${segments}
              <span class="bar-val">${dayTotal}</span>
            </div>
            <span class="bar-label">${esc(d.date.slice(5))}</span>
          </div>`;
        }
        html += '</div>';
      } else {
        html += '<p style="color:var(--muted);text-align:center;padding:40px 0;">No data yet — feeds will populate on next refresh.</p>';
      }
      html += '</div>';

      // Donut — severity breakdown
      const total = (sev.critical||0) + (sev.high||0) + (sev.medium||0) + (sev.low||0) + (sev.unknown||0);
      const pcts = {};
      let cumulative = 0;
      for (const s of ['critical','high','medium','low','unknown']) {
        pcts[s] = total ? Math.round(((sev[s]||0)/total)*100) : 0;
      }
      const colors = {critical:'#ff4d6d', high:'#ffb703', medium:'#4cc9f0', low:'#80ed99', unknown:'#9aa8c3'};
      let gradient = '';
      cumulative = 0;
      for (const s of ['critical','high','medium','low','unknown']) {
        const next = cumulative + pcts[s];
        gradient += `${colors[s]} ${cumulative}% ${next}%, `;
        cumulative = next;
      }
      gradient = gradient.slice(0, -2);

      html += `<div class="chart-panel">
        <div class="chart-title">Severity Breakdown</div>
        <div class="donut-wrap">
          <div class="donut" style="background: conic-gradient(${gradient});">
            <div class="donut-inner">${esc(total)}</div>
          </div>
          <div class="donut-legend">
            <div><span class="legend-dot" style="background:${colors.critical}"></span> Critical: ${esc(sev.critical||0)}</div>
            <div><span class="legend-dot" style="background:${colors.high}"></span> High: ${esc(sev.high||0)}</div>
            <div><span class="legend-dot" style="background:${colors.medium}"></span> Medium: ${esc(sev.medium||0)}</div>
            <div><span class="legend-dot" style="background:${colors.low}"></span> Low: ${esc(sev.low||0)}</div>
            <div><span class="legend-dot" style="background:${colors.unknown}"></span> Unknown: ${esc(sev.unknown||0)}</div>
          </div>
        </div>
      </div>`;
      html += '</div>'; // close charts

      // Tables row: Top Tags + Top IOCs
      html += '<div class="tables-row">';

      html += '<div class="table-panel"><div class="chart-title">Top Tags</div>';
      if (analytics.top_tags && analytics.top_tags.length) {
        html += '<table><thead><tr><th>#</th><th>Tag</th><th>Count</th></tr></thead><tbody>';
        analytics.top_tags.forEach((t,i) => {
          html += `<tr><td>${i+1}</td><td>${esc(t.tag)}</td><td>${esc(t.count)}</td></tr>`;
        });
        html += '</tbody></table>';
      } else {
        html += '<p style="color:var(--muted);text-align:center;padding:20px 0;">No tags yet.</p>';
      }
      html += '</div>';

      html += '<div class="table-panel"><div class="chart-title">Top IOCs</div>';
      if (analytics.top_iocs && analytics.top_iocs.length) {
        html += '<table><thead><tr><th>#</th><th>IOC</th><th>Appearances</th></tr></thead><tbody>';
        analytics.top_iocs.forEach((t,i) => {
          html += `<tr><td>${i+1}</td><td style="font-family:monospace;font-size:0.8rem;word-break:break-all;">${esc(t.ioc)}</td><td>${esc(t.count)}</td></tr>`;
        });
        html += '</tbody></table>';
      } else {
        html += '<p style="color:var(--muted);text-align:center;padding:20px 0;">No IOCs extracted yet.</p>';
      }
      html += '</div>';
      html += '</div>'; // close tables-row

      // CVE frequency chart (only shown when >= 5 unique CVEs exist)
      if (analytics.cve_graph && analytics.cve_graph.length >= 5) {
        const topCVEs = analytics.cve_graph.slice(0, 20);
        const maxCVECount = Math.max(...topCVEs.map(c => c.count), 1);
        html += '<div class="table-panel" style="margin-bottom:28px;">';
        html += '<div class="chart-title">CVE Frequency — Most Referenced CVEs (Last 30 Days)</div>';
        html += '<div style="display:flex;flex-direction:column;gap:6px;margin-top:4px;">';
        for (const entry of topCVEs) {
          const pct = Math.max(Math.round((entry.count / maxCVECount) * 100), 2);
          html += `<div style="display:flex;align-items:center;gap:10px;">
            <span style="font-family:monospace;font-size:0.78rem;color:#ff6b6b;min-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${esc(entry.cve)}">${esc(entry.cve)}</span>
            <div style="flex:1;height:14px;background:var(--line);border-radius:4px;overflow:hidden;">
              <div style="width:${pct}%;height:100%;background:linear-gradient(90deg,#c0392b,#ff6b6b);border-radius:4px;transition:width 0.4s ease;"></div>
            </div>
            <span style="font-size:0.76rem;color:var(--muted);min-width:28px;text-align:right;">${esc(entry.count)}</span>
          </div>`;
        }
        html += '</div></div>';
      }

      // Feed health
      const feeds = feedData.feeds || [];
      html += '<div class="feed-panel"><div class="chart-title">Feed Health Status</div>';
      for (const f of feeds) {
        let dotClass = 'off';
        let statusLabel = 'Disabled';
        if (f.enabled) {
          if (f.last_error) { dotClass = 'err'; statusLabel = 'Error'; }
          else if (!f.last_fetched) { dotClass = 'warn'; statusLabel = 'Pending'; }
          else { dotClass = 'ok'; statusLabel = 'Healthy'; }
        }
        html += `<div class="feed-row">
          <span><span class="feed-dot ${dotClass}"></span>${esc(f.name)} <span style="color:var(--muted);font-size:0.78rem;">(${esc(f.category)})</span></span>
          <span>${esc(f.item_count)} items · ${esc(statusLabel)}</span>
        </div>`;
        if (f.last_error) {
          html += `<div class="feed-row" style="padding-left:16px;"><span style="color:var(--danger);font-size:0.78rem;">Error: ${esc(f.last_error)}</span></div>`;
        }
      }
      html += '</div>';

      el.innerHTML = html;
    }

    // Theme
    const themeBtn = document.getElementById('themeBtn');
    function applyTheme(light) {
      document.body.classList.toggle('light', light);
      themeBtn.textContent = light ? '☀' : '🌙';
    }
    applyTheme(localStorage.getItem('theme') === 'light');
    themeBtn.addEventListener('click', () => {
      const isLight = !document.body.classList.contains('light');
      applyTheme(isLight);
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
    });

    // Hamburger
    const menuToggle = document.getElementById('menuToggle');
    const navLinks = document.querySelector('.nav-links');
    menuToggle.addEventListener('click', () => {
      navLinks.classList.toggle('open');
      menuToggle.textContent = navLinks.classList.contains('open') ? '✕' : '☰';
    });
    document.addEventListener('click', e => {
      if (!e.target.closest('.nav-links') && !e.target.closest('#menuToggle')) {
        navLinks.classList.remove('open');
        menuToggle.textContent = '☰';
      }
    });

    loadDashboard().catch(err => {
      document.getElementById('content').innerHTML =
        `<div class="loading-msg" style="color:#ff9b9b;">Failed to load analytics: ${esc(err.message)}</div>`;
    });
  </script>
</body>
</html>
