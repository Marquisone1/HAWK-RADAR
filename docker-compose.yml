services:
  hawk-radar:
    build: .
    container_name: hawk-radar
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - ./data:/data
    env_file:
      - .env
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3001/login')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
